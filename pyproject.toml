[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=1.3",
    "ruff>=0.7.0",
    "pre-commit>=3.7.0",
    "ty>=0.0.39",
]

[tool.pytest.ini_options]
testpaths = ["packages"]
# importlib mode lets packages share test-file basenames (e.g. test_tools.py)
# without rootdir-level __init__.py files.
addopts = "--import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "UP007",  # Allow Optional[X] / Union[X, Y] in addition to X | Y
    "UP045",  # Same, for the newer ruff rule that covers Optional specifically
]
