[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "skillos-core"
version = "0.1.0"
description = "Core abstractions for SkillOS"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fsspec>=2023.1.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
s3 = ["s3fs"]
gcs = ["gcsfs"]
azure = ["adlfs"]

[tool.setuptools.packages.find]
where = ["src"]
