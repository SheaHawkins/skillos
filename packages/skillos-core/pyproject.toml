[build-system]
requires = ["setuptools>=61", "wheel", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "skillos-core"
dynamic = ["version"]
description = "Core abstractions for SkillOS"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "fsspec>=2024.6.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
s3    = ["s3fs>=2024.6.0"]
gcs   = ["gcsfs>=2024.6.0"]
azure = ["adlfs>=2024.4.0"]
all   = ["s3fs>=2024.6.0", "gcsfs>=2024.6.0", "adlfs>=2024.4.0"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["skillos_core*"]

[tool.setuptools_scm]
root = "../.."
version_file = "src/skillos_core/_version.py"
