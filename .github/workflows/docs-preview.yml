name: Preview docs

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material

      - run: mkdocs build --strict

      - name: Deploy preview to gh-pages
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages
          git checkout gh-pages

          mkdir -p "preview/${SHORT_SHA}"
          rm -rf "preview/${SHORT_SHA}/"*
          cp -r site/* "preview/${SHORT_SHA}/"

          git add "preview/${SHORT_SHA}"
          git commit -m "docs: preview ${SHORT_SHA}"
          git push origin gh-pages

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const url = `https://sheahawkins.github.io/skillos/preview/${sha}/`;
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
              state: 'open'
            });
            for (const pr of pulls.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Docs preview ready: ${url}`
              });
            }

  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove all previews for merged PR
        run: |
          if [ ! -d "preview" ] || [ -z "$(ls -A preview 2>/dev/null)" ]; then
            echo "No previews to clean up"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Get commits from the merged PR branch
          PR_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${PR_SHA:0:7}"

          if [ -d "preview/${SHORT_SHA}" ]; then
            git rm -rf "preview/${SHORT_SHA}"
            git commit -m "docs: cleanup preview for PR #${{ github.event.pull_request.number }}"
            git push origin gh-pages
          else
            echo "No preview found for ${SHORT_SHA}"
          fi
