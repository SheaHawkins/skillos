name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install mkdocs-material

      - run: mkdocs build --strict

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          TMP=$(mktemp -d)

          # Preserve preview directories if they exist
          if git show gh-pages:preview 2>/dev/null; then
            git archive gh-pages -- preview | tar -x -C "$TMP"
          fi

          git checkout --orphan gh-pages-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp -r site/* .

          # Restore previews
          if [ -d "$TMP/preview" ]; then
            cp -r "$TMP/preview" .
          fi
          rm -rf "$TMP"

          git add -A
          git commit -m "docs: deploy from ${GITHUB_SHA:0:7}"
          git branch -M gh-pages-tmp gh-pages
          git push origin gh-pages --force
